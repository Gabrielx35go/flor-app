<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pedido</title>
  <style>
    :root {
      --text:#4b2030;
      --rose:#cf5f86;
      --rose-dark:#b0436c;
      --bg:#f8eef2;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: #f3e8ed;
      color: var(--text);
    }
    .app {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(12px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
    }
    .stage {
      position: relative;
      width: min(100vw - 24px, 760px);
      aspect-ratio: 1195 / 1536;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(104,45,66,.18);
      background: #f4dde6;
    }
    .stage img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
    .hotspot {
      position: absolute;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 999px;
    }
    .hotspot:focus-visible {
      outline: 2px solid rgba(255,255,255,.95);
      outline-offset: 2px;
    }

    /* left lotus petal click zones */
    .p-lugar      { left: 37.5%; top: 22.2%; width: 14.5%; height: 25%; transform: translate(-50%, -50%); }
    .p-alianca    { left: 63.2%; top: 31.6%; width: 18%;   height: 17%; transform: translate(-50%, -50%) rotate(-9deg); }
    .p-caixa      { left: 66.2%; top: 54.5%; width: 18%;   height: 16.5%; transform: translate(-50%, -50%) rotate(10deg); }
    .p-buque      { left: 43.5%; top: 61.8%; width: 15.5%; height: 22%; transform: translate(-50%, -50%); }
    .p-surpresas  { left: 13.6%; top: 53.4%; width: 20%;   height: 18%; transform: translate(-50%, -50%) rotate(-10deg); }
    .p-extras     { left: 13.9%; top: 33.8%; width: 19%;   height: 17%; transform: translate(-50%, -50%) rotate(8deg); }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(79, 29, 46, .28);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s ease;
    }
    .modal-backdrop.show {
      opacity: 1;
      pointer-events: auto;
    }
    .modal {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(.96);
      width: min(92vw, 520px);
      max-height: min(86vh, 900px);
      overflow: auto;
      background: rgba(255,247,250,.98);
      border-radius: 28px;
      box-shadow: 0 24px 80px rgba(74,28,45,.24);
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s ease, transform .32s ease;
      padding: 18px;
    }
    .modal.show {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }
    .modal-head {
      display:flex;
      justify-content: space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom: 14px;
    }
    .modal-title {
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }
    .badge {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display:grid;
      place-items:center;
      font-size: 1.5rem;
      background: linear-gradient(180deg, #ffe5ee, #f4c9d7);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.8);
      flex: 0 0 auto;
    }
    .modal-title h2 {
      margin: 0;
      font-size: clamp(1.9rem, 4vw, 2.5rem);
      line-height: 1;
      letter-spacing: -.05em;
      font-family: Georgia, "Times New Roman", serif;
      color: #5a2336;
    }
    .close {
      border: none;
      background: rgba(255,255,255,.92);
      width: 44px;
      height: 44px;
      border-radius: 14px;
      font-size: 1.4rem;
      color: #5a2336;
      box-shadow: 0 10px 20px rgba(147,94,117,.12);
      cursor: pointer;
    }
    .hero-petal {
      width: 100%;
      aspect-ratio: 1.55 / 1;
      border-radius: 30px;
      overflow: hidden;
      margin-bottom: 18px;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,.55), transparent 24%),
        linear-gradient(180deg,#ffdce8 0%, #f6bccf 56%, #e388a8 100%);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.7), 0 16px 28px rgba(191,109,138,.18);
      position: relative;
    }
    .hero-petal::before {
      content:"";
      position:absolute;
      inset: 0;
      background:
        linear-gradient(105deg, rgba(255,255,255,.0) 28%, rgba(255,255,255,.25) 34%, rgba(255,255,255,.08) 39%, rgba(255,255,255,0) 44%),
        radial-gradient(circle at 30% 72%, rgba(255,255,255,.10), transparent 30%);
      pointer-events:none;
    }
    .hero-petal::after {
      content:"";
      position:absolute;
      inset: 8% 22% 10% 22%;
      border-radius: 60% 60% 60% 60% / 72% 72% 38% 38%;
      border: 1.8px solid rgba(255,255,255,.38);
      opacity:.65;
      transform: rotate(8deg);
    }
    .hero-icon {
      position:absolute;
      left: 24px;
      top: 20px;
      font-size: 2rem;
      filter: drop-shadow(0 2px 8px rgba(255,255,255,.35));
    }
    .hero-label {
      position:absolute;
      left: 24px;
      bottom: 18px;
      font-size: 1.8rem;
      line-height: 1;
      letter-spacing: -.04em;
      font-family: Georgia, "Times New Roman", serif;
      color: #5a2336;
    }
    .field {
      margin-bottom: 14px;
    }
    .field-head {
      display:flex;
      justify-content: space-between;
      align-items:center;
      gap:12px;
      margin-bottom:8px;
    }
    .field-head label {
      font-weight: 800;
      font-size: 1rem;
      color: #5a2336;
    }
    .field-head span {
      color: #8d6b79;
      font-size: .9rem;
    }
    input, textarea {
      width: 100%;
      border: none;
      outline: none;
      background: white;
      border-radius: 18px;
      padding: 15px 16px;
      font-size: 1rem;
      box-shadow: inset 0 0 0 1px rgba(231,197,210,.9);
      color: #4f2836;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    .actions {
      display:flex;
      gap:12px;
      margin-top: 6px;
    }
    .save, .delete {
      flex:1;
      border: none;
      border-radius: 18px;
      padding: 16px;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
    }
    .save {
      color: white;
      background: linear-gradient(180deg, var(--rose), var(--rose-dark));
      box-shadow: 0 16px 24px rgba(176,67,108,.22);
    }
    .delete {
      color: #8a5368;
      background: rgba(255,255,255,.92);
      box-shadow: inset 0 0 0 1px rgba(226,191,204,.9);
    }

    @media (max-width: 420px) {
      .app { padding-left:0; padding-right:0; }
      .stage {
        width: 100vw;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>

      <button class="hotspot p-lugar" aria-label="Lugar" data-topic="lugar"></button>
      <button class="hotspot p-alianca" aria-label="Aliança" data-topic="alianca"></button>
      <button class="hotspot p-caixa" aria-label="Caixa" data-topic="caixa"></button>
      <button class="hotspot p-buque" aria-label="Buquê" data-topic="buque"></button>
      <button class="hotspot p-surpresas" aria-label="Surpresas" data-topic="surpresas"></button>
      <button class="hotspot p-extras" aria-label="Extras" data-topic="extras"></button>
    </div>
  </div>

  <div class="modal-backdrop" id="backdrop"></div>
  <section class="modal" id="modal" aria-hidden="true">
    <div class="modal-head">
      <div class="modal-title">
        <div class="badge" id="badge"></div>
        <h2 id="title"></h2>
      </div>
      <button class="close" id="closeBtn" aria-label="Fechar">×</button>
    </div>

    <div class="hero-petal">
      <div class="hero-icon" id="heroIcon"></div>
      <div class="hero-label" id="heroLabel"></div>
    </div>

    <div class="field">
      <div class="field-head"><label>Link</label><span>produto ou referência</span></div>
      <input id="link" type="text" placeholder="https://..." />
    </div>

    <div class="field">
      <div class="field-head"><label>Valor</label><span>entra no gráfico</span></div>
      <input id="value" type="number" step="0.01" placeholder="R$ 0,00" />
    </div>

    <div class="field">
      <div class="field-head"><label>Anotações</label><span>ideias, detalhes e lembretes</span></div>
      <textarea id="notes" placeholder="Escreva aqui..."></textarea>
    </div>

    <div class="actions">
      <button class="save" id="saveBtn">Salvar</button>
      <button class="delete" id="deleteBtn">Excluir tópico</button>
    </div>
  </section>

  <script>
    const TOPICS = {
      lugar:     { label: 'Lugar', icon: '📍' },
      alianca:   { label: 'Aliança', icon: '💍' },
      caixa:     { label: 'Caixa', icon: '🎁' },
      buque:     { label: 'Buquê', icon: '💐' },
      surpresas: { label: 'Surpresas', icon: '✨' },
      extras:    { label: 'Extras', icon: '💗' }
    };

    const storeKey = 'pedido.topics.exato';
    const data = JSON.parse(localStorage.getItem(storeKey) || '{}');

    const backdrop = document.getElementById('backdrop');
    const modal = document.getElementById('modal');
    const title = document.getElementById('title');
    const badge = document.getElementById('badge');
    const heroIcon = document.getElementById('heroIcon');
    const heroLabel = document.getElementById('heroLabel');
    const link = document.getElementById('link');
    const value = document.getElementById('value');
    const notes = document.getElementById('notes');
    const closeBtn = document.getElementById('closeBtn');
    const saveBtn = document.getElementById('saveBtn');
    const deleteBtn = document.getElementById('deleteBtn');

    let currentTopic = null;

    function openTopic(topic) {
      currentTopic = topic;
      const meta = TOPICS[topic];
      const current = data[topic] || {};

      title.textContent = meta.label;
      badge.textContent = meta.icon;
      heroIcon.textContent = meta.icon;
      heroLabel.textContent = meta.label;
      link.value = current.link || '';
      value.value = current.value || '';
      notes.value = current.notes || '';

      backdrop.classList.add('show');
      modal.classList.add('show');
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeTopic() {
      backdrop.classList.remove('show');
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      currentTopic = null;
    }

    document.querySelectorAll('.hotspot').forEach(btn => {
      btn.addEventListener('click', () => openTopic(btn.dataset.topic));
    });

    closeBtn.addEventListener('click', closeTopic);
    backdrop.addEventListener('click', closeTopic);

    saveBtn.addEventListener('click', () => {
      if (!currentTopic) return;
      data[currentTopic] = {
        link: link.value.trim(),
        value: value.value.trim(),
        notes: notes.value.trim()
      };
      localStorage.setItem(storeKey, JSON.stringify(data));
      closeTopic();
    });

    deleteBtn.addEventListener('click', () => {
      if (!currentTopic) return;
      delete data[currentTopic];
      localStorage.setItem(storeKey, JSON.stringify(data));
      link.value = '';
      value.value = '';
      notes.value = '';
      closeTopic();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeTopic();
    });
  </script>
</body>
</html>
